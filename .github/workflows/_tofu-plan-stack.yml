name: "[reusable] OpenTofu Plan Stack"

# This workflow is called by plan.yml for each stack × environment combination.
# It is not triggered directly — the workflow_call event makes it a reusable workflow.
on:
  workflow_call:
    inputs:
      stack_name:
        description: "Stack name (matches stacks/<name>/)"
        required: true
        type: string
      tofu_version:
        description: "OpenTofu version constraint"
        required: false
        type: string
        default: "~1.10"
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      environment:
        description: "Environment name (e.g. dev, prod)"
        required: false
        type: string
        default: ""
      spacelift_dep_stack:
        description: "Full Spacelift stack ID to fetch cross-stack outputs from (e.g. network-dev)"
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        required: true
      # Spacelift API keys are optional — if absent, cross-stack outputs are
      # skipped and the plan runs with incomplete variable values. This is
      # acceptable for initial bootstrapping before Spacelift is configured.
      SPACELIFT_API_KEY_ID:
        required: false
      SPACELIFT_API_KEY_SECRET:
        required: false
    outputs:
      plan_summary:
        description: "Single-line plan summary (Plan: X to add... or No changes.)"
        value: ${{ jobs.plan.outputs.plan_summary }}

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # TF_IN_AUTOMATION suppresses interactive prompts and adjusts output
      # formatting for CI — OpenTofu detects this and skips suggestions like
      # "Did you forget to run tofu init?".
      TF_IN_AUTOMATION: "true"
    outputs:
      plan_summary: ${{ steps.extract.outputs.plan_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ inputs.tofu_version }}

      # The IAM role is assumed via OIDC — no long-lived AWS credentials are
      # stored in GitHub. The trust policy (stacks/iam/main.tf) restricts
      # assumption to pull_request events on this specific repository.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region || 'us-east-1' }}

      # Cross-stack stub variables for CI plans. Static per-environment config
      # is provided via -var-file (stacks/<name>/<env>.tfvars). These stubs
      # cover dynamic cross-stack inputs (vpc_id, subnet_ids, cluster endpoint,
      # etc.) that only exist after upstream stacks have been applied. They are
      # not set in tfvars so that Spacelift's native TF_VAR_* cross-stack
      # injection can override them on real applies without being blocked by a
      # higher-precedence -var-file entry. OpenTofu silently ignores TF_VAR_*
      # that do not match a declared variable in the target stack.
      - name: Inject cross-stack stub variables
        if: inputs.environment != ''
        run: |
          set -euo pipefail
          if [[ "${{ inputs.environment }}" == "dev" ]]; then
            {
              echo "TF_VAR_vpc_id=vpc-00000000000000000"
              echo "TF_VAR_vpc_cidr_block=10.0.0.0/16"
              echo 'TF_VAR_subnet_ids=["subnet-00000000000000000","subnet-11111111111111111"]'
              echo "TF_VAR_eks_cluster_name=argocd-dev"
              echo "TF_VAR_eks_cluster_endpoint=https://stub.gr7.us-east-1.eks.amazonaws.com"
              echo "TF_VAR_cluster_ca_"
              echo "TF_VAR_aws_lb_controller_role_arn=arn:aws:iam::123456789012:role/argocd-dev-aws-lb-controller"
              echo "TF_VAR_cluster_autoscaler_role_arn=arn:aws:iam::123456789012:role/argocd-dev-cluster-autoscaler"
              echo "TF_VAR_external_secrets_role_arn=arn:aws:iam::123456789012:role/argocd-dev-external-secrets"
            } >> "$GITHUB_ENV"
          elif [[ "${{ inputs.environment }}" == "prod" ]]; then
            {
              echo "TF_VAR_vpc_id=vpc-11111111111111111"
              echo "TF_VAR_vpc_cidr_block=10.1.0.0/16"
              echo 'TF_VAR_subnet_ids=["subnet-22222222222222222","subnet-33333333333333333"]'
              echo "TF_VAR_eks_cluster_name=argocd-prod"
              echo "TF_VAR_eks_cluster_endpoint=https://stub.gr7.us-east-1.eks.amazonaws.com"
              echo "TF_VAR_cluster_ca_"
              echo "TF_VAR_aws_lb_controller_role_arn=arn:aws:iam::123456789012:role/argocd-prod-aws-lb-controller"
              echo "TF_VAR_cluster_autoscaler_role_arn=arn:aws:iam::123456789012:role/argocd-prod-cluster-autoscaler"
              echo "TF_VAR_external_secrets_role_arn=arn:aws:iam::123456789012:role/argocd-prod-external-secrets"
            } >> "$GITHUB_ENV"
          fi

      - name: Setup spacectl
        if: inputs.spacelift_dep_stack != ''
        uses: spacelift-io/setup-spacectl@d0e2c81467c31a68af60db5b1f9f1f54f79cab96 # v2.0.0

      # Cross-stack outputs (e.g. vpc_id, cluster endpoint) are fetched from
      # Spacelift and injected as TF_VAR_* environment variables so the plan
      # has real values rather than empty strings. Without these, resource
      # references that depend on other stacks would show as "(known after apply)".
      - name: Fetch cross-stack outputs
        if: inputs.spacelift_dep_stack != ''
        env:
          SPACELIFT_API_KEY_ENDPOINT: ${{ vars.SPACELIFT_API_URL }}
          SPACELIFT_API_KEY_ID: ${{ secrets.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ secrets.SPACELIFT_API_KEY_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${SPACELIFT_API_KEY_ID:-}" || -z "${SPACELIFT_API_KEY_SECRET:-}" ]]; then
            echo "Spacelift API keys not configured — skipping cross-stack output fetch. Plan may be incomplete."
            exit 0
          fi
          OUTPUTS=$(spacectl stack outputs --id "${{ inputs.spacelift_dep_stack }}" --output json 2>&1) || {
            echo "Stack '${{ inputs.spacelift_dep_stack }}' not found in Spacelift — cross-stack outputs unavailable. Plan will use stub values."
            exit 0
          }
          # Map all Spacelift outputs to TF_VAR_* env vars in one pass.
          # - private_subnet_ids → subnet_ids to match the TF variable name.
          # - Strip surrounding JSON-encoded quotes Spacelift adds to string values.
          # - Skip null and empty values so stub values from the previous step are preserved.
          # OpenTofu silently ignores TF_VAR_* that have no matching variable.
          echo "$OUTPUTS" | jq -r '
            .[] |
            select(.value != null) |
            (if .id == "private_subnet_ids" then "subnet_ids" else .id end) as $var |
            (.value | ltrimstr("\"") | rtrimstr("\"")) as $val |
            select($val != "") |
            "TF_VAR_\($var)=\($val)"
          ' >> "$GITHUB_ENV"

      # -backend=false skips remote state initialisation — GitHub Actions does
      # not need (or have credentials for) the Spacelift backend. Plans run
      # against local state, which is sufficient for drift detection on PRs.
      - name: Init
        run: tofu -chdir=stacks/${{ inputs.stack_name }} init -backend=false -input=false

      - name: Plan
        run: |
          set -euo pipefail
          VAR_FILE_ARG=""
          if [[ -n "${{ inputs.environment }}" ]]; then
            VAR_FILE_ARG="-var-file=${{ inputs.environment }}.tfvars"
          fi
          tofu -chdir=stacks/${{ inputs.stack_name }} plan \
            ${VAR_FILE_ARG} \
            -input=false \
            -no-color 2>&1 | tee /tmp/${{ inputs.stack_name }}-plan.txt

      # Extract the summary line so plan.yml can aggregate it into a PR comment
      # without having to parse the full plan output.
      - name: Extract plan summary
        id: extract
        if: always()
        run: |
          set -euo pipefail
          PLAN_FILE="/tmp/${{ inputs.stack_name }}-plan.txt"
          if [[ ! -f "$PLAN_FILE" ]]; then
            echo "plan_summary=Plan did not produce output — see logs." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PLAN_LINE="$(grep '^Plan:' "$PLAN_FILE" | tail -1 || true)"
          if [[ -z "$PLAN_LINE" ]]; then
            echo "plan_summary=No changes." >> "$GITHUB_OUTPUT"
          else
            echo "plan_summary=${PLAN_LINE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: opentofu-plan-${{ inputs.stack_name }}-${{ inputs.environment || 'shared' }}
          path: /tmp/${{ inputs.stack_name }}-plan.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Add job summary
        if: always()
        run: |
          PLAN_FILE="/tmp/${{ inputs.stack_name }}-plan.txt"
          {
            echo "## OpenTofu plan: ${{ inputs.stack_name }}/${{ inputs.environment || 'shared' }}"
            echo ""
            echo "**${{ steps.extract.outputs.plan_summary }}**"
            echo ""
            if [[ -f "$PLAN_FILE" ]]; then
              echo "<details><summary>Full plan output</summary>"
              echo ""
              echo '```'
              cat "$PLAN_FILE"
              echo '```'
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
