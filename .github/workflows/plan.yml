name: opentofu-plan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# pull-requests: write is intentionally omitted here — granting it at workflow
# level would give every reusable plan job PR write access, which they do not
# need. It is declared only on the plan-summary job that posts PR comments.
permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

# Explicit dev/prod jobs (no matrix) so the PR comment can show per-environment
# results. A matrix strategy aggregates all legs into a single result, making
# it impossible to distinguish which environment failed.

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      has_tf: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Only run the full plan pipeline when Terraform files actually changed.
      # Docs-only PRs skip all plan jobs so required checks pass without running tofu.
      - name: Check for Terraform changes
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            stacks/**
            modules/**
            .github/workflows/plan.yml
            .github/workflows/_tofu-plan-stack.yml

  plan-network-dev:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_tf == 'true'
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: network
      environment: dev
      aws_region: ${{ vars.AWS_REGION }}
    secrets: inherit

  plan-network-prod:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_tf == 'true'
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: network
      environment: prod
      aws_region: ${{ vars.AWS_REGION }}
    secrets: inherit

  plan-eks-dev:
    needs: plan-network-dev
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: eks
      environment: dev
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: network-dev
    secrets: inherit

  plan-eks-prod:
    needs: plan-network-prod
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: eks
      environment: prod
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: network-prod
    secrets: inherit

  plan-eks-addons-dev:
    needs: plan-eks-dev
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: eks-addons
      environment: dev
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: eks-dev
    secrets: inherit

  plan-eks-addons-prod:
    needs: plan-eks-prod
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: eks-addons
      environment: prod
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: eks-prod
    secrets: inherit

  plan-kyverno-dev:
    needs: plan-eks-addons-dev
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: kyverno
      environment: dev
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: eks-addons-dev
    secrets: inherit

  plan-kyverno-prod:
    needs: plan-eks-addons-prod
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: kyverno
      environment: prod
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: eks-addons-prod
    secrets: inherit

  plan-argo-cd-dev:
    needs: plan-kyverno-dev
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: argo-cd
      environment: dev
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: kyverno-dev
    secrets: inherit

  plan-argo-cd-prod:
    needs: plan-kyverno-prod
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: argo-cd
      environment: prod
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: kyverno-prod
    secrets: inherit

  plan-prometheus-dev:
    needs: plan-kyverno-dev
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: prometheus
      environment: dev
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: kyverno-dev
    secrets: inherit

  plan-prometheus-prod:
    needs: plan-kyverno-prod
    uses: ./.github/workflows/_tofu-plan-stack.yml
    with:
      stack_name: prometheus
      environment: prod
      aws_region: ${{ vars.AWS_REGION }}
      spacelift_dep_stack: kyverno-prod
    secrets: inherit

  plan-summary:
    needs:
      - detect-changes
      - plan-network-dev
      - plan-network-prod
      - plan-eks-dev
      - plan-eks-prod
      - plan-eks-addons-dev
      - plan-eks-addons-prod
      - plan-kyverno-dev
      - plan-kyverno-prod
      - plan-argo-cd-dev
      - plan-argo-cd-prod
      - plan-prometheus-dev
      - plan-prometheus-prod
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Build combined summary
        id: summary
        env:
          NETWORK_DEV:        ${{ needs.plan-network-dev.result }}
          NETWORK_PROD:       ${{ needs.plan-network-prod.result }}
          EKS_DEV:            ${{ needs.plan-eks-dev.result }}
          EKS_PROD:           ${{ needs.plan-eks-prod.result }}
          EKS_ADDONS_DEV:     ${{ needs.plan-eks-addons-dev.result }}
          EKS_ADDONS_PROD:    ${{ needs.plan-eks-addons-prod.result }}
          KYVERNO_DEV:        ${{ needs.plan-kyverno-dev.result }}
          KYVERNO_PROD:       ${{ needs.plan-kyverno-prod.result }}
          ARGOCD_DEV:         ${{ needs.plan-argo-cd-dev.result }}
          ARGOCD_PROD:        ${{ needs.plan-argo-cd-prod.result }}
          PROMETHEUS_DEV:     ${{ needs.plan-prometheus-dev.result }}
          PROMETHEUS_PROD:    ${{ needs.plan-prometheus-prod.result }}
        run: |
          set -euo pipefail
          result_icon() {
            case "$1" in
              success) echo "✅" ;;
              skipped) echo "⏭️" ;;
              *)        echo "❌" ;;
            esac
          }
          {
            echo "body<<COMMENT_EOF"
            echo "<!-- opentofu-plan-summary -->"
            echo "## OpenTofu plan summary"
            echo ""
            echo "| Stack | dev | prod |"
            echo "| --- | --- | --- |"
            echo "| network    | $(result_icon "${NETWORK_DEV}") ${NETWORK_DEV}             | $(result_icon "${NETWORK_PROD}") ${NETWORK_PROD}             |"
            echo "| eks        | $(result_icon "${EKS_DEV}") ${EKS_DEV}                     | $(result_icon "${EKS_PROD}") ${EKS_PROD}                     |"
            echo "| eks-addons | $(result_icon "${EKS_ADDONS_DEV}") ${EKS_ADDONS_DEV}       | $(result_icon "${EKS_ADDONS_PROD}") ${EKS_ADDONS_PROD}       |"
            echo "| kyverno    | $(result_icon "${KYVERNO_DEV}") ${KYVERNO_DEV}             | $(result_icon "${KYVERNO_PROD}") ${KYVERNO_PROD}             |"
            echo "| argo-cd    | $(result_icon "${ARGOCD_DEV}") ${ARGOCD_DEV}               | $(result_icon "${ARGOCD_PROD}") ${ARGOCD_PROD}               |"
            echo "| prometheus | $(result_icon "${PROMETHEUS_DEV}") ${PROMETHEUS_DEV}       | $(result_icon "${PROMETHEUS_PROD}") ${PROMETHEUS_PROD}       |"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Add workflow summary
        run: echo "${{ steps.summary.outputs.body }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          COMMENT_BODY: ${{ steps.summary.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- opentofu-plan-summary -->';
            const body = process.env.COMMENT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # Gate fails only on explicit failure — skipped jobs (docs-only PRs) are allowed.
      - name: Enforce gate
        if: |
          needs.plan-network-dev.result     == 'failure' ||
          needs.plan-network-prod.result    == 'failure' ||
          needs.plan-eks-dev.result         == 'failure' ||
          needs.plan-eks-prod.result        == 'failure' ||
          needs.plan-eks-addons-dev.result  == 'failure' ||
          needs.plan-eks-addons-prod.result == 'failure' ||
          needs.plan-kyverno-dev.result     == 'failure' ||
          needs.plan-kyverno-prod.result    == 'failure' ||
          needs.plan-argo-cd-dev.result     == 'failure' ||
          needs.plan-argo-cd-prod.result    == 'failure' ||
          needs.plan-prometheus-dev.result  == 'failure' ||
          needs.plan-prometheus-prod.result == 'failure'
        run: |
          echo "network    dev:  ${{ needs.plan-network-dev.result }}"
          echo "network    prod: ${{ needs.plan-network-prod.result }}"
          echo "eks        dev:  ${{ needs.plan-eks-dev.result }}"
          echo "eks        prod: ${{ needs.plan-eks-prod.result }}"
          echo "eks-addons dev:  ${{ needs.plan-eks-addons-dev.result }}"
          echo "eks-addons prod: ${{ needs.plan-eks-addons-prod.result }}"
          echo "kyverno    dev:  ${{ needs.plan-kyverno-dev.result }}"
          echo "kyverno    prod: ${{ needs.plan-kyverno-prod.result }}"
          echo "argo-cd    dev:  ${{ needs.plan-argo-cd-dev.result }}"
          echo "argo-cd    prod: ${{ needs.plan-argo-cd-prod.result }}"
          echo "prometheus dev:  ${{ needs.plan-prometheus-dev.result }}"
          echo "prometheus prod: ${{ needs.plan-prometheus-prod.result }}"
          echo ""
          echo "OpenTofu plan gate failed — one or more stacks did not succeed."
          exit 1
